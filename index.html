<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Scratch Player</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      position: fixed;
      inset: 0;
    }

    #stage {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background-size: 100% 100%;
      background-repeat: no-repeat;
      background-position: center;
    }

    .sprite {
      position: absolute;
      transform: translate(-50%, -50%);
      user-select: none;
      -webkit-user-drag: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="stage"></div>

  <script>
    const stage = document.getElementById("stage");

    const LOGICAL_WIDTH = 480;
    const LOGICAL_HEIGHT = 360;

    function scratchX(x) {
      return 240 + x;
    }

    function scratchY(y) {
      return 180 - y;
    }

    function placeSprite(img, target) {
      const scaleX = window.innerWidth / LOGICAL_WIDTH;
      const scaleY = window.innerHeight / LOGICAL_HEIGHT;

      img.style.left = (scratchX(target.x || 0) * scaleX) + "px";
      img.style.top = (scratchY(target.y || 0) * scaleY) + "px";
      img.style.width = ((target.size || 100) * scaleX) + "px";
      img.style.height = "auto";
    }

    function randomPosition(target) {
      const x = Math.random() * LOGICAL_WIDTH - LOGICAL_WIDTH / 2;
      const y = Math.random() * LOGICAL_HEIGHT - LOGICAL_HEIGHT / 2;
      target.x = x;
      target.y = y;
    }

    fetch("project.json")
      .then(r => r.json())
      .then(project => {
        const stageTarget = project.targets.find(t => t.isStage);

        if (stageTarget && stageTarget.costumes && stageTarget.costumes[0]) {
          stage.style.backgroundImage = `url("${stageTarget.costumes[0].md5ext}")`;
        }

        project.targets.forEach(target => {
          if (target.isStage) return;

          const img = document.createElement("img");
          img.className = "sprite";
          img.src = target.costumes && target.costumes[0] ? target.costumes[0].md5ext : "";
          img.style.display = target.visible === false ? "none" : "block";
          img.__target = target;

          img.onload = () => {
            placeSprite(img, target);
          };

          placeSprite(img, target);

          img.onclick = () => {
            randomPosition(target);
            placeSprite(img, target);
          };

          window.addEventListener("resize", () => {
            placeSprite(img, target);
          });

          stage.appendChild(img);
        });
      })
      .catch(err => {
        console.error(err);
        stage.innerHTML = "<div style='color:white;padding:20px'>Erro ao carregar project.json</div>";
      });
  </script>
</body>
</html>
